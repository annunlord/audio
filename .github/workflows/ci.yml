name: Generate Configuration PDF

on:
  push:
    branches:
      - main
    paths:
      - 'config/**' # Only run when files in the config folder change
  workflow_dispatch: # Adds a button to the Actions tab to trigger manually

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PDF & Mermaid Tools
        # md-to-pdf creates the PDF. @mermaid-js/mermaid-cli parses the diagrams.
        run: npm install -g md-to-pdf @mermaid-js/mermaid-cli

      - name: Render Mermaid Diagrams
        run: |
          cd config
          # Puppeteer requires --no-sandbox to run inside GitHub Actions containers
          echo '{"args": ["--no-sandbox", "--disable-setuid-sandbox"]}' > puppeteer-config.json
          
          # This reads CONFIGURING.md, generates the mermaid graphs as SVGs/PNGs, 
          # and creates a new temporary MD file with the diagrams embedded as images.
          mmdc -i CONFIGURING.md -o CONFIGURING_with_diagrams.md -p puppeteer-config.json

      - name: Generate PDF
        run: |
          cd config
          # Configure md-to-pdf to bypass the sandbox restriction
          echo 'module.exports = { puppeteer_options: { args: ["--no-sandbox", "--disable-setuid-sandbox"] } };' > .md-to-pdf.js
          
          # Convert the diagram-rendered markdown into a PDF
          md-to-pdf CONFIGURING_with_diagrams.md

      - name: Clean up temporary files & Rename
        run: |
          cd config
          mv CONFIGURING_with_diagrams.pdf CONFIGURING.pdf
          rm CONFIGURING_with_diagrams.md puppeteer-config.json .md-to-pdf.js

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Church-Audio-Configuration-PDF
          path: config/CONFIGURING.pdf
          retention-days: 30
          
      # OPTIONAL: Uncomment the block below if you want the bot to automatically 
      # commit the PDF back to your repository instead of just attaching it as an artifact.
      #
      # - name: Commit PDF back to repository
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "docs: Auto-generate CONFIGURING.pdf"
      #     file_pattern: 'config/CONFIGURING.pdf'